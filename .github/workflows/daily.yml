name: Daily FX Pipeline Run

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ETL pipeline
        run: python3 etl.py

      - name: Commit updated database
        run: |
          git config user.name "fx-pipeline-bot"
          git config user.email "actions@github.com"
          git add data/fx_rates.db
          git diff --staged --quiet || git commit -m "Daily FX rate update: $(date -u +'%Y-%m-%d')"
          git push